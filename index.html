<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d0d" />
  <title>Sapiens · Datos Curiosos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: rgba(255,255,255,0.07);
      --accent: #c9a84c;
      --accent-soft: rgba(201,168,76,0.12);
      --text-primary: #f0ebe0;
      --text-secondary: rgba(240,235,224,0.55);
      --text-dim: rgba(240,235,224,0.3);
      --radius: 20px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      overflow-x: hidden;
    }

    /* ─── Header ─── */
    header {
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .book-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .book-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .book-title {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .book-author {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .counter-badge {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      font-variant-numeric: tabular-nums;
    }

    /* ─── Main content ─── */
    main {
      flex: 1;
      padding: 24px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .card.animating {
      opacity: 0;
      transform: translateY(12px) scale(0.98);
    }

    .card-top {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .category-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 20px;
      padding: 4px 10px;
      margin-bottom: 12px;
    }

    .fact-headline {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--text-primary);
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    .fact-number {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .fact-development {
      font-size: 15px;
      line-height: 1.7;
      color: rgba(240,235,224,0.8);
      font-weight: 300;
    }

    /* ─── Quote block ─── */
    .quote-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .quote-card.animating {
      opacity: 0;
      transform: translateY(8px);
    }

    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 48px;
      line-height: 1;
      color: var(--accent);
      opacity: 0.3;
      position: absolute;
      top: 8px;
      left: 16px;
    }

    .quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      line-height: 1.65;
      font-style: italic;
      color: var(--text-secondary);
      padding-top: 16px;
    }

    .quote-source {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      letter-spacing: 0.05em;
    }

    /* ─── Stats row ─── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .stats-row.animating {
      opacity: 0;
      transform: translateY(8px);
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
    }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
      line-height: 1.4;
      font-weight: 400;
    }

    /* ─── Chapter pill ─── */
    .chapter-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .chapter-dot {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.6;
    }

    /* ─── Bottom toolbar ─── */
    footer {
      padding: 12px 20px calc(env(safe-area-inset-bottom, 16px) + 12px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-main {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      padding: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s ease, transform 0.12s ease;
      letter-spacing: 0.01em;
    }

    .btn-main:active {
      opacity: 0.85;
      transform: scale(0.97);
    }

    .btn-main svg {
      width: 18px;
      height: 18px;
      transition: transform 0.4s ease;
    }

    .btn-main.spinning svg {
      animation: spin 0.5s ease;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .toolbar-sub {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-sub {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 10px;
      color: var(--text-secondary);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s ease, transform 0.12s ease;
    }

    .btn-sub:active {
      background: rgba(255,255,255,0.05);
      transform: scale(0.96);
    }

    .btn-sub.active {
      color: var(--accent);
      border-color: rgba(201,168,76,0.3);
      background: var(--accent-soft);
    }

    /* ─── Progress dots ─── */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 2px 0;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .dot.visited {
      background: var(--accent);
      opacity: 0.5;
    }

    .dot.current {
      background: var(--accent);
      opacity: 1;
      transform: scale(1.3);
    }

    /* ─── Share toast ─── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 100px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,30,0.95);
      border: 1px solid var(--border);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text-primary);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Gradient accent line ─── */
    .accent-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
      margin: 0 24px;
    }
  </style>
</head>
<body>

<header>

</main>

<footer>
  <button class="btn-main" id="btn-new" onclick="nextFact()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

  <div class="toolbar-sub">
    <button class="btn-sub" id="btn-fav" onclick="toggleFav()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>

    <button class="btn-sub" onclick="shareFact()">

</footer>

<div class="toast" id="toast"></div>

<script>

    development: "Hace 70.000 años algo mutó en el cerebro de los sapiens. De repente podían hablar de cosas que no existen: dioses, naciones, dinero, derechos humanos. Ningún otro animal puede convencerse a sí mismo de que algo imaginario es real. Esa capacidad única fue el arma secreta que nos llevó a dominar el planeta.",

let currentIndex = 0;
let visited = new Set();
let favorites = JSON.parse(localStorage.getItem('sapiens_favs') || '[]');
let history = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

const order = shuffle([...Array(FACTS.length).keys()]);
let orderPos = 0;

function getCurrentFact() {
  return FACTS[order[orderPos % order.length]];
}

function renderFact(fact, animate = false) {
  const mainCard = document.getElementById('main-card');
  const quoteCard = document.getElementById('quote-card');
  const statsRow = document.getElementById('stats-row');

  if (animate) {
    mainCard.classList.add('animating');
    quoteCard.classList.add('animating');
    statsRow.classList.add('animating');
  }

  setTimeout(() => {
    document.getElementById('category-icon').textContent = fact.icon;
    document.getElementById('category-text').textContent = fact.category;
    document.getElementById('fact-headline').textContent = fact.headline;
    document.getElementById('chapter-source').textContent = fact.chapter;
    document.getElementById('fact-development').textContent = fact.development;
    document.getElementById('quote-text').textContent = fact.quote;
    document.getElementById('quote-source').textContent = `— Sapiens, cap. ${fact.chapter.split('·')[0].trim()}`;
    document.getElementById('stat1-value').textContent = fact.stat1.value;
    document.getElementById('stat1-label').textContent = fact.stat1.label;
    document.getElementById('stat2-value').textContent = fact.stat2.value;
    document.getElementById('stat2-label').textContent = fact.stat2.label;

    const idx = order[orderPos % order.length];
    visited.add(idx);
    updateCounter();
    updateFavButton();
    renderDots();

    if (animate) {
      mainCard.classList.remove('animating');
      quoteCard.classList.remove('animating');
      statsRow.classList.remove('animating');
    }
  }, animate ? 300 : 0);
}

function nextFact() {
  const btn = document.getElementById('btn-new');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 500);

  history.push(orderPos);
  orderPos = (orderPos + 1) % order.length;
  renderFact(getCurrentFact(), true);
}

function updateCounter() {
  document.getElementById('counter').textContent = `${visited.size} / ${FACTS.length}`;
}

function updateFavButton() {
  const idx = order[orderPos % order.length];
  const btn = document.getElementById('btn-fav');
  if (favorites.includes(idx)) {
    btn.classList.add('active');
    btn.querySelector('svg').setAttribute('fill', 'currentColor');
  } else {
    btn.classList.remove('active');
    btn.querySelector('svg').setAttribute('fill', 'none');
  }
}

function toggleFav() {
  const idx = order[orderPos % order.length];
  const pos = favorites.indexOf(idx);
  if (pos === -1) {
    favorites.push(idx);
    showToast('Guardado en favoritos ❤️');
  } else {
    favorites.splice(pos, 1);
    showToast('Eliminado de favoritos');
  }
  localStorage.setItem('sapiens_favs', JSON.stringify(favorites));
  updateFavButton();
}

function renderDots() {
  const container = document.getElementById('progress-dots');
  const MAX_DOTS = 12;
  const total = Math.min(FACTS.length, MAX_DOTS);
  container.innerHTML = '';
  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot';
    const factIdx = order[i % order.length];
    if (i === orderPos % order.length) dot.classList.add('current');
    else if (visited.has(factIdx)) dot.classList.add('visited');
    container.appendChild(dot);
  }
}

function shareFact() {
  const fact = getCurrentFact();
  const text = `📖 Sapiens · Dato curioso\n\n"${fact.headline}"\n\n${fact.development}\n\n— Yuval Noah Harari`;

  if (navigator.share) {
    navigator.share({ title: 'Sapiens · Dato curioso', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Copiado al portapapeles ✓')).catch(() => showToast('No se pudo copiar'));
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

// Swipe gesture
let touchStartX = 0, touchStartY = 0;
document.getElementById('main-content').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('main-content').addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  const dy = touchStartY - e.changedTouches[0].clientY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    nextFact();
  }
}, { passive: true });

// Init
renderFact(getCurrentFact(), false);
</script>
