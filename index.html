<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0d0d0d" id="theme-meta" />
  <title>Biblioteca · Datos Curiosos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── TOKENS ─── */
    :root {
      --accent: #c9a84c;
      --accent-soft: rgba(201,168,76,0.13);
      --accent-border: rgba(201,168,76,0.28);
      --radius: 18px;
      --font-serif: 'Lora', Georgia, serif;
      --font-sans: 'Inter', system-ui, sans-serif;
    }

    [data-theme="dark"] {
      --bg: #111111;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: rgba(255,255,255,0.08);
      --text1: #f2ede2;
      --text2: rgba(242,237,226,0.62);
      --text3: rgba(242,237,226,0.32);
      --shadow: 0 4px 24px rgba(0,0,0,0.5);
      --btn-sub-bg: #1e1e1e;
    }

    [data-theme="light"] {
      --bg: #f5f0e8;
      --surface: #ffffff;
      --surface2: #ede8df;
      --border: rgba(0,0,0,0.09);
      --text1: #1a1814;
      --text2: rgba(26,24,20,0.62);
      --text3: rgba(26,24,20,0.38);
      --shadow: 0 4px 24px rgba(0,0,0,0.1);
      --btn-sub-bg: #eee9e1;
    }

    /* ─── BASE ─── */
    html { height: 100%; }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text1);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top, 0);
      padding-bottom: env(safe-area-inset-bottom, 0);
      transition: background 0.3s, color 0.3s;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      padding: 16px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .book-label { display: flex; align-items: center; gap: 10px; }

    .book-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 16px; font-weight: 700;
      color: var(--accent); letter-spacing: 0.02em;
    }

    .brand-sub {
      font-size: 11px; color: var(--text3);
      font-weight: 400; letter-spacing: 0.06em;
      text-transform: uppercase; margin-top: 1px;
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .counter-badge {
      font-size: 12px; color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 11px;
      font-variant-numeric: tabular-nums;
      transition: background 0.3s, border 0.3s, color 0.3s;
    }

    .btn-theme {
      width: 36px; height: 36px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.12s;
    }
    .btn-theme:active { transform: scale(0.9); }

    /* ─── DIVIDER ─── */
    .accent-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.25; margin: 14px 20px 0;
      flex-shrink: 0;
    }

    /* ─── SCROLL AREA ─── */
    main {
      flex: 1;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      word-break: break-word;
      overflow-wrap: break-word;
      transition: opacity 0.28s ease, transform 0.28s ease, background 0.3s, border 0.3s, box-shadow 0.3s;
    }

    .card.fade-out { opacity: 0; transform: translateY(10px) scale(0.985); }

    .card-top {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
      transition: border 0.3s;
    }

    .category-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 20px; padding: 4px 11px; margin-bottom: 12px;
    }

    .source-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--text3);
      background: var(--surface2);
      border-radius: 20px; padding: 3px 9px; margin-bottom: 12px; margin-left: 6px;
      transition: background 0.3s, color 0.3s;
    }

    .fact-headline {
      font-family: var(--font-serif);
      font-size: 21px; line-height: 1.35;
      font-weight: 700; color: var(--text1);
      hyphens: auto; -webkit-hyphens: auto;
      word-break: break-word;
      transition: color 0.3s;
    }

    .card-body { padding: 14px 18px 18px; }

    .chapter-label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text3); margin-bottom: 10px;
      transition: color 0.3s;
    }

    .fact-development {
      font-size: 16px; line-height: 1.75;
      color: var(--text2); font-weight: 400;
      word-break: break-word; overflow-wrap: break-word;
      hyphens: auto; -webkit-hyphens: auto;
      transition: color 0.3s;
    }

    /* ─── QUOTE ─── */
    .quote-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 16px 18px 18px;
      box-shadow: var(--shadow);
      word-break: break-word; overflow-wrap: break-word;
      transition: opacity 0.28s ease, transform 0.28s ease, background 0.3s, border 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .quote-card.fade-out { opacity: 0; transform: translateY(8px); }

    .quote-mark {
      font-family: var(--font-serif);
      font-size: 52px; line-height: 1;
      color: var(--accent); opacity: 0.22;
      position: absolute; top: 6px; left: 14px;
    }

    .quote-text {
      font-family: var(--font-serif);
      font-size: 15px; line-height: 1.7;
      font-style: italic; color: var(--text2);
      padding-top: 18px;
      hyphens: auto; -webkit-hyphens: auto;
      word-break: break-word; overflow-wrap: break-word;
      transition: color 0.3s;
    }

    .quote-source {
      margin-top: 10px; font-size: 12px;
      color: var(--text3); text-align: right;
      letter-spacing: 0.04em; transition: color 0.3s;
    }

    /* ─── STATS ─── */
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      transition: opacity 0.28s ease, transform 0.28s ease;
    }

    .stats-row.fade-out { opacity: 0; transform: translateY(8px); }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 14px;
      box-shadow: var(--shadow);
      word-break: break-word; overflow-wrap: break-word;
      transition: background 0.3s, border 0.3s, box-shadow 0.3s;
    }

    .stat-value {
      font-family: var(--font-serif);
      font-size: 24px; font-weight: 700;
      color: var(--accent); line-height: 1.15;
      word-break: break-all;
    }

    .stat-label {
      font-size: 12px; color: var(--text3);
      margin-top: 4px; line-height: 1.45;
      font-weight: 400; transition: color 0.3s;
    }

    /* ─── MIX CARD ─── */
    .mix-card {
      background: var(--surface);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      box-shadow: 0 0 0 1px var(--accent-soft), var(--shadow);
      display: none;
      word-break: break-word; overflow-wrap: break-word;
      transition: background 0.3s, border 0.3s, box-shadow 0.3s;
    }

    .mix-card.visible { display: block; }

    .mix-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }

    .mix-badge {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--bg);
      background: var(--accent);
      border-radius: 20px; padding: 3px 10px;
    }

    .mix-books {
      font-size: 11px; color: var(--text3);
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }

    .mix-dot { width: 3px; height: 3px; background: var(--accent); border-radius: 50%; }

    .mix-connection {
      font-family: var(--font-serif);
      font-size: 16px; line-height: 1.65;
      color: var(--text1); font-weight: 600;
      margin-bottom: 10px;
      hyphens: auto; -webkit-hyphens: auto;
      transition: color 0.3s;
    }

    .mix-detail {
      font-size: 15px; line-height: 1.72;
      color: var(--text2);
      hyphens: auto; -webkit-hyphens: auto;
      word-break: break-word; overflow-wrap: break-word;
      transition: color 0.3s;
    }

    /* ─── DOTS ─── */
    .progress-dots {
      display: flex; justify-content: center; gap: 5px; padding: 2px 0;
    }

    .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--border); transition: background 0.3s, transform 0.3s;
    }

    .dot.visited { background: var(--accent); opacity: 0.4; }
    .dot.current { background: var(--accent); opacity: 1; transform: scale(1.4); }

    /* ─── FOOTER ─── */
    footer {
      flex-shrink: 0;
      padding: 10px 16px calc(env(safe-area-inset-bottom, 12px) + 10px);
      display: flex; flex-direction: column; gap: 9px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      transition: border 0.3s, background 0.3s;
    }

    .btn-main {
      width: 100%; background: var(--accent);
      color: #0d0d0d; font-family: var(--font-sans);
      font-size: 16px; font-weight: 600;
      border: none; border-radius: 13px; padding: 17px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s, transform 0.12s;
      letter-spacing: 0.01em;
    }

    .btn-main:active { opacity: 0.82; transform: scale(0.97); }

    .btn-main svg { width: 17px; height: 17px; transition: transform 0.45s; }
    .btn-main.spinning svg { animation: spin 0.5s ease; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .toolbar-sub { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

    .btn-sub {
      background: var(--btn-sub-bg);
      border: 1px solid var(--border);
      border-radius: 11px; padding: 11px 6px;
      color: var(--text2); font-family: var(--font-sans);
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, transform 0.12s, color 0.3s, border 0.3s;
    }

    .btn-sub:active { background: var(--surface2); transform: scale(0.95); }

    .btn-sub.active {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-soft);
    }

    .btn-mix {
      background: var(--accent-soft);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    .btn-mix.on {
      background: var(--accent);
      color: #0d0d0d;
      border-color: var(--accent);
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 96px);
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 10px 18px;
      font-size: 13px; color: var(--text1);
      opacity: 0; transition: opacity 0.22s, transform 0.22s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* scrollbar invisible */
    main::-webkit-scrollbar { display: none; }
    main { scrollbar-width: none; }
  </style>
</head>

</main>

    <button class="btn-sub" onclick="shareFact()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>

    </button>
  </div>
</footer>

<div class="toast" id="toast"></div>

/* ─── STATE ─── */
let orderPos = 0;
let mixPos = 0;
let showMix = false;
let visited = new Set();
let favorites = JSON.parse(localStorage.getItem('bib_favs') || '[]');
let theme = localStorage.getItem('bib_theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');

const order = shuffle([...Array(FACTS.length).keys()]);
const mixOrder = shuffle([...Array(MIXES.length).keys()]);

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ─── RENDER ─── */
function currentFact() { return FACTS[order[orderPos % order.length]]; }
function currentMix()  { return MIXES[mixOrder[mixPos % mixOrder.length]]; }

function renderAll(animate) {
  const f = currentFact();
  const els = [
    document.getElementById('main-card'),
    document.getElementById('quote-card'),
    document.getElementById('stats-row')
  ];

  if (animate) {
    els.forEach(e => e.classList.add('fade-out'));
    setTimeout(() => { applyFact(f); els.forEach(e => e.classList.remove('fade-out')); }, 280);
  } else {
    applyFact(f);
  }

  if (showMix) renderMix(animate);
}

function applyFact(f) {
  document.getElementById('cat-icon').textContent = f.icon;
  document.getElementById('cat-text').textContent = f.cat;
  document.getElementById('source-tag').textContent = f.bookShort;
  document.getElementById('fact-headline').textContent = f.headline;
  document.getElementById('chapter-label').textContent = f.chapter;
  document.getElementById('fact-development').textContent = f.dev;
  document.getElementById('quote-text').textContent = f.quote;
  document.getElementById('quote-source').textContent = `— ${f.book}, ${f.author}`;
  document.getElementById('stat1v').textContent = f.s1.v;
  document.getElementById('stat1l').textContent = f.s1.l;
  document.getElementById('stat2v').textContent = f.s2.v;
  document.getElementById('stat2l').textContent = f.s2.l;

  visited.add(order[orderPos % order.length]);
  document.getElementById('counter').textContent = `${visited.size} / ${FACTS.length}`;
  updateFavBtn();
  renderDots();
  document.getElementById('main-content').scrollTop = 0;
}

function renderMix(animate) {
  const m = currentMix();
  const card = document.getElementById('mix-card');
  if (animate) {
    card.style.opacity = '0'; card.style.transform = 'translateY(10px)';
    setTimeout(() => {
      applyMix(m);
      card.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
      card.style.opacity = ''; card.style.transform = '';
    }, 280);
  } else {
    applyMix(m);
  }
}

function applyMix(m) {
  document.getElementById('mix-books').textContent = m.books;
  document.getElementById('mix-connection').textContent = m.connection;
  document.getElementById('mix-detail').textContent = m.detail;
}

function renderDots() {
  const c = document.getElementById('progress-dots');
  const MAX = 15;
  c.innerHTML = '';
  for (let i = 0; i < Math.min(FACTS.length, MAX); i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === orderPos % order.length ? ' current' : visited.has(order[i]) ? ' visited' : '');
    c.appendChild(d);
  }
}

/* ─── ACTIONS ─── */
function nextFact() {
  const btn = document.getElementById('btn-new');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 500);

  orderPos++;
  if (showMix) mixPos++;
  renderAll(true);
}

function toggleMix() {
  showMix = !showMix;
  const card = document.getElementById('mix-card');
  const btn = document.getElementById('btn-mix');

  if (showMix) {
    card.classList.add('visible');
    btn.classList.add('on');
    btn.textContent = '✕ Cerrar';
    renderMix(false);
    setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  } else {
    card.classList.remove('visible');
    btn.classList.remove('on');
    btn.textContent = '🔀 Mezclar';
  }
}

function updateFavBtn() {
  const idx = order[orderPos % order.length];
  const btn = document.getElementById('btn-fav');
  const isFav = favorites.includes(idx);
  btn.classList.toggle('active', isFav);
  btn.querySelector('svg').setAttribute('fill', isFav ? 'currentColor' : 'none');
}

function toggleFav() {
  const idx = order[orderPos % order.length];
  const pos = favorites.indexOf(idx);
  if (pos === -1) { favorites.push(idx); showToast('Guardado ❤️'); }
  else { favorites.splice(pos, 1); showToast('Eliminado'); }
  localStorage.setItem('bib_favs', JSON.stringify(favorites));
  updateFavBtn();
}

function shareFact() {
  const f = currentFact();
  const text = `📚 ${f.book} · ${f.author}\n\n"${f.headline}"\n\n${f.dev}`;
  if (navigator.share) navigator.share({ title: f.headline, text }).catch(() => {});
  else navigator.clipboard.writeText(text).then(() => showToast('Copiado ✓')).catch(() => showToast('No se pudo copiar'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ─── THEME ─── */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('btn-theme').textContent = t === 'dark' ? '🌙' : '☀️';
  document.getElementById('theme-meta').setAttribute('content', t === 'dark' ? '#111111' : '#f5f0e8');
}

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('bib_theme', theme);
  applyTheme(theme);
}

/* ─── SWIPE ─── */
let tx = 0, ty = 0;
document.getElementById('main-content').addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY;
}, { passive: true });

document.getElementById('main-content').addEventListener('touchend', e => {
  const dx = tx - e.changedTouches[0].clientX;
  const dy = ty - e.changedTouches[0].clientY;
  if (Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy)) nextFact();
}, { passive: true });

/* ─── INIT ─── */
applyTheme(theme);
renderAll(false);
</script>
